# VM Production Configuration for Config Server

spring:
  application:
    name: config-server
  profiles:
    active: ${CONFIG_PROFILE:git} # Use git for production VM
  cloud:
    config:
      server:
        # Git repository configuration (for production)
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/ChamathDilshanC/cafeteria-config-repo.git}
          default-label: ${CONFIG_LABEL:main}
          clone-on-start: true
          timeout: 10
          force-pull: true
          search-paths:
            - platform
            - services
        # Fallback to native if git fails
        native:
          search-locations: ${CONFIG_SEARCH_LOCATIONS:classpath:/config}

server:
  port: ${CONFIG_SERVER_PORT:8888}

# VM Network Configuration
eureka:
  client:
    service-url:
      default-zone: http://35.198.196.99:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: 35.198.196.99
    prefer-ip-address: true
    ip-address: 35.198.196.99
    instance-id: ${spring.application.name}:${server.port}

# Production Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,env,refresh,configprops
  endpoint:
    health:
      show-details: always
  server:
    port: ${CONFIG_SERVER_PORT:8888}

# Production logging
logging:
  level:
    root: INFO
    org.springframework.cloud.config: DEBUG
    com.cafeteria: INFO
  file:
    name: /var/log/cafeteria/config-server.log