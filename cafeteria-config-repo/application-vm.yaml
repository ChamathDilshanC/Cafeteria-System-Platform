# Production Configuration for VM Deployment
# VM IP: 35.198.196.99

spring:
  profiles:
    active: production

# Production database settings with environment variables
datasource:
  mysql:
    url: jdbc:mysql://${MYSQL_HOST:35.198.196.99}:3306/${MYSQL_DATABASE:cafeteria_db}?useSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:cafeteria_user}
    password: ${MYSQL_PASSWORD:password123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  mongodb:
    uri: mongodb://${MONGO_USER:admin}:${MONGO_PASSWORD:adminpassword}@${MONGO_HOST:35.198.196.99}:27017/${MONGO_DATABASE:kitchen_service_db}?authSource=admin
    database: ${MONGO_DATABASE:kitchen_service_db}

# Production JPA settings
jpa:
  hibernate:
    ddl-auto: update  # Use update for initial deployment, change to validate later
  show-sql: false
  properties:
    hibernate:
      format_sql: false
      dialect: org.hibernate.dialect.MySQL8Dialect

# Production Eureka settings
eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default-zone: http://35.198.196.99:8761/eureka
  instance:
    hostname: 35.198.196.99
    prefer-ip-address: true

# Production Config Server URL
spring:
  config:
    import: "configserver:http://35.198.196.99:8888"

# Production security settings
jwt:
  secret: ${JWT_SECRET:your-production-secret-key-change-this}
  expiration: 3600000   # 1 hour in production

# Production logging
logging:
  level:
    root: INFO
    com.cafeteria: INFO
  file:
    name: /var/log/cafeteria/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"