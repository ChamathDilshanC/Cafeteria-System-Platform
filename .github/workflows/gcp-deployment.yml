name: Cafetaria System - GCP Deployment
on: push

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VM_INSTANCE_NAME: cafeteria-system-vm-platform-seed
      VM_ZONE: asia-southeast1-c
      USERNAME: chammaofficial12

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up gcloud Cloud SDK environment
        uses: google-github-actions/setup-gcloud@v3.0.1

      - name: Start the cafeteria-system-vm-platform-seed instance
        run: |
          gcloud compute instances start ${{ env.VM_INSTANCE_NAME }} --zone=${{ env.VM_ZONE }}

      - name: Connect and Update Code
        run: |
          gcloud compute ssh ${{ env.USERNAME }}@${{ env.VM_INSTANCE_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --quiet \
            --command "
              echo 'Connected to ${{ env.VM_INSTANCE_NAME }} Successfully!' && \
              cd Cafeteria-System-Platform/ && \
              git pull --recurse-submodules && \
              source ~/.bashrc && \
              mvn clean package
            "
      - name: Stop the cafeteria-system-vm-platform-seed instance
        run: |
          gcloud compute instances stop ${{ env.VM_INSTANCE_NAME }} --zone=${{ env.VM_ZONE }}
